<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Paris School of Business · 典礼打卡文案工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-blue:#1e3766;
    --brand-blue-dark:#16284c;
    --brand-blue-deep:#0f1c38;
    --brand-red:#9e375a;
    --brand-red-dark:#7e2b47;
    --ink:#141823;
    --ink-2:#3a4154;
    --ink-3:#6b7284;
    --line:#e7e9f0;
    --paper:#ffffff;
    --paper-2:#f5f6fa;
    --paper-3:#edeff5;
    --gold:#b58a3c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--paper-2);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    font-feature-settings:"ss01","cv11";
  }
  .serif{font-family:'Noto Serif SC',serif;}
  .display{font-family:'Playfair Display',serif;}
  .app{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    box-shadow:0 0 60px rgba(15,28,56,0.08);
    overflow:hidden;
  }

  /* ============ Top brand bar ============ */
  .topbar{
    height:5px;
    background:linear-gradient(90deg,var(--brand-blue) 0%, var(--brand-blue) 60%, var(--brand-red) 60%, var(--brand-red) 100%);
  }
  .header{
    padding:14px 22px;
    border-bottom:3px solid var(--brand-red);
    display:flex;align-items:center;gap:13px;
    position:relative;
    background:var(--brand-blue);
  }
  .brand-cn{
    font-family:'Noto Serif SC',serif;
    font-weight:900;
    font-size:18px;
    line-height:1.15;
    color:#fff;
    letter-spacing:1px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .logo-img{
    height:56px;
    width:auto;
    max-width:34%;
    display:block;
    object-fit:contain;
    filter:brightness(0) invert(1);
  }
  .accred{
    margin-left:auto;
    display:flex;flex-direction:column;align-items:center;gap:7px;
    padding-left:16px;
    align-self:stretch;
    justify-content:center;
    border-left:1px solid rgba(255,255,255,0.22);
  }
  .accred-img{
    height:24px;width:auto;display:block;
    opacity:0.95;
  }
  .accred-cap{
    font-size:10px;font-weight:700;color:rgba(255,255,255,0.85);
    letter-spacing:2px;
  }

  /* ============ Hero banner ============ */
  .hero-banner{
    width:100%;
    background:var(--brand-blue);
    display:block;
    line-height:0;
    border-bottom:3px solid var(--brand-red);
  }
  .hero-banner-img{
    width:100%;
    height:auto;
    display:block;
  }

  /* ============ Sections ============ */
  .section{padding:22px 22px 4px;}
  .section-head{
    display:flex;flex-direction:column;align-items:flex-start;gap:6px;
    margin-bottom:14px;
  }
  .section-title{
    display:flex;align-items:center;gap:10px;
    font-size:11px;font-weight:700;color:var(--ink-2);
    letter-spacing:1.6px;text-transform:uppercase;
  }
  .section-title .step{
    width:20px;height:20px;
    background:var(--brand-blue);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;
    font-family:'Inter',sans-serif;
  }
  .section-hint{
    font-size:10px;color:var(--ink-3);letter-spacing:1.8px;
    font-weight:600;
    padding-left:30px;
  }

  /* ============ Mode selector ============ */
  .mode-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .mode-card{
    border:1.5px solid var(--line);
    background:#fff;
    padding:18px 16px;
    cursor:pointer;
    transition:all 0.25s cubic-bezier(.2,.8,.2,1);
    text-align:left;
    position:relative;
    overflow:hidden;
    font-family:inherit;
    display:flex;flex-direction:column;gap:6px;
  }
  .mode-card:active{transform:scale(0.98);}
  .mode-card .title{
    font-family:'Noto Serif SC',serif;
    font-weight:900;font-size:19px;color:var(--ink);
    line-height:1.2;
  }
  .mode-card .meta{
    font-size:10.5px;color:var(--ink-3);
    letter-spacing:0.3px;
  }
  .mode-card.active.opening{
    border-color:var(--brand-blue);
    background:linear-gradient(180deg,rgba(30,55,102,0.05),rgba(30,55,102,0.01));
  }
  .mode-card.active.opening .title{color:var(--brand-blue);}
  .mode-card.active.graduation{
    border-color:var(--brand-red);
    background:linear-gradient(180deg,rgba(158,55,90,0.05),rgba(158,55,90,0.01));
  }
  .mode-card.active.graduation .title{color:var(--brand-red);}
  .mode-card .ribbon{
    position:absolute;left:0;bottom:0;
    height:3px;width:0;background:var(--brand-blue);
    transition:width .35s cubic-bezier(.2,.8,.2,1);
  }
  .mode-card.active.opening .ribbon{width:100%;background:var(--brand-blue);}
  .mode-card.active.graduation .ribbon{width:100%;background:var(--brand-red);}

  /* ============ Program selector ============ */
  .prog-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .prog{
    border:1.5px solid var(--line);
    background:#fff;
    padding:13px 14px;
    text-align:left;
    cursor:pointer;
    transition:all .2s ease;
    position:relative;
    font-family:inherit;
    display:flex;align-items:center;gap:11px;
    min-height:74px;
    min-width:0;
    overflow:hidden;
  }
  .prog:active{transform:scale(0.98);}
  .prog .code{
    width:38px;height:38px;flex-shrink:0;
    border:1.5px solid var(--brand-blue);
    color:var(--brand-blue);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:10.5px;letter-spacing:0;
    font-family:'Inter',sans-serif;
  }
  .prog .meta-wrap{
    min-width:0;flex:1 1 0;overflow:hidden;
    display:flex;flex-direction:column;gap:3px;
  }
  .prog .name{
    display:block;
    font-weight:700;font-size:13.5px;color:var(--ink);
    line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .prog .desc{
    display:block;
    font-size:9px;color:var(--ink-3);
    margin-top:0;letter-spacing:0.1px;
    line-height:1.3;
    white-space:normal;
    word-break:break-word;
  }
  .prog.selected{
    border-color:var(--brand-blue);
    background:linear-gradient(180deg,rgba(30,55,102,0.05),#fff);
  }
  .prog.selected .code{
    background:var(--brand-blue);color:#fff;
  }
  .prog.selected::after{
    content:"✓";
    position:absolute;top:6px;right:8px;
    font-size:11px;color:var(--brand-blue);font-weight:800;
  }
  body.mode-graduation .prog.selected{
    border-color:var(--brand-red);
    background:linear-gradient(180deg,rgba(158,55,90,0.05),#fff);
  }
  body.mode-graduation .prog.selected .code{
    background:var(--brand-red);color:#fff;border-color:var(--brand-red);
  }
  body.mode-graduation .prog.selected::after{color:var(--brand-red);}

  /* ============ Submit button ============ */
  .submit-wrap{padding:22px 22px 0;}
  .submit{
    width:100%;
    padding:16px;
    background:var(--ink);
    color:#fff;
    border:0;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    letter-spacing:1.5px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all .25s;
    position:relative;
    overflow:hidden;
  }
  .submit:disabled{opacity:0.55;cursor:not-allowed;}
  .submit .arrow{transition:transform .3s;}
  .submit:not(:disabled):hover .arrow{transform:translateX(4px);}
  .submit:not(:disabled):active{transform:scale(0.99);}
  .submit.opening{background:var(--brand-blue);}
  .submit.graduation{background:var(--brand-red);}

  /* ============ Output ============ */
  .output-wrap{padding:24px 22px 0;}
  .output-card{
    border:1.5px solid var(--line);
    background:#fff;
    position:relative;
    overflow:hidden;
  }
  .output-accent{
    height:5px;background:var(--brand-blue);
    transition:background .4s;
  }
  body.mode-graduation .output-accent{background:var(--brand-red);}
  .output-head{
    padding:14px 16px 10px;
    border-bottom:1px dashed var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .output-head .label{
    font-size:10px;font-weight:700;letter-spacing:1.8px;
    color:var(--brand-blue);text-transform:uppercase;
  }
  body.mode-graduation .output-head .label{color:var(--brand-red);}
  .output-head .seal{
    font-size:9.5px;color:var(--ink-3);
    display:flex;align-items:center;gap:5px;
    letter-spacing:0.4px;
  }
  .output-head .seal::before{
    content:"";width:6px;height:6px;background:var(--brand-red);border-radius:50%;
  }
  .output-body{
    padding:16px;
    font-size:13.5px;line-height:1.75;color:var(--ink);
    max-height:380px;overflow-y:auto;
    -webkit-user-select:text;user-select:text;
  }
  .output-body .first-line{
    font-family:'Noto Serif SC',serif;
    font-size:15.5px;font-weight:800;color:var(--ink);
    border-left:3px solid var(--brand-red);
    padding-left:10px;margin-bottom:14px;line-height:1.4;
  }
  body.mode-graduation .output-body .first-line{border-left-color:var(--brand-red);}
  body.mode-opening .output-body .first-line{border-left-color:var(--brand-blue);}
  .output-body p{margin:0 0 10px;}
  .output-body .tag{
    color:var(--brand-blue);
    font-size:12.5px;display:inline-block;margin-right:6px;
    font-weight:600;
  }
  body.mode-graduation .output-body .tag{color:var(--brand-red);}
  .output-footer{
    padding:12px 16px 16px;
    border-top:1px solid var(--line);
    background:var(--paper-2);
  }
  .copy-btn{
    width:100%;
    padding:14px;
    background:var(--ink);
    color:#fff;
    border:0;
    font-family:inherit;font-weight:700;font-size:13px;
    letter-spacing:1.5px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:all .2s;
  }
  .copy-btn:active{transform:scale(0.98);}
  .copy-btn.opening{background:var(--brand-blue);}
  .copy-btn.graduation{background:var(--brand-red);}

  .skeleton{
    padding:36px 18px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .spinner{
    width:34px;height:34px;
    border:2.5px solid var(--paper-3);
    border-top-color:var(--brand-blue);
    border-radius:50%;
    animation:spin .9s linear infinite;
  }
  body.mode-graduation .spinner{border-top-color:var(--brand-red);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .skeleton .txt{
    font-size:11px;color:var(--ink-3);letter-spacing:1.5px;
  }

  /* ============ Footer ============ */
  .foot{
    padding:24px 22px 30px;
    text-align:center;
    font-size:10px;color:var(--ink-3);letter-spacing:0.8px;
    line-height:1.7;
  }
  .foot .divider{
    display:flex;align-items:center;gap:10px;
    margin-bottom:16px;
    font-size:9.5px;color:var(--ink-3);
    letter-spacing:2px;font-weight:600;
    text-transform:uppercase;
  }
  .foot .divider .bar{flex:1;height:1px;background:var(--line);}
  .foot .divider .mid{
    display:flex;align-items:center;gap:6px;
  }
  .foot .divider .mid b{width:7px;height:7px;background:var(--brand-blue);}
  .foot .divider .mid i{width:7px;height:7px;background:var(--brand-red);}
  .foot .official{
    color:var(--brand-blue);font-weight:700;
    letter-spacing:1.5px;
  }

  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:30px;transform:translate(-50%,20px);
    opacity:0;pointer-events:none;
    background:var(--ink);color:#fff;
    padding:12px 22px;font-size:12px;font-weight:600;
    letter-spacing:0.8px;
    display:flex;align-items:center;gap:9px;
    transition:all .35s cubic-bezier(.2,.8,.2,1);
    z-index:100;
    border-left:3px solid var(--brand-red);
  }
  .toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto;}
  .toast.err{border-left-color:#e0506e;}
  .toast.ok{border-left-color:#2ea76a;}
  .toast .ico{
    width:18px;height:18px;border-radius:50%;
    background:rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;
  }

  .reveal{animation:rev .45s cubic-bezier(.2,.8,.2,1);}
  @keyframes rev{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .hidden{display:none !important;}
</style>
</head>
<body class="mode-none">
  <div class="app">

    <!-- Brand header on blue -->
    <header class="header">
      <img class="logo-img" src="assets/psb-logo.png" alt="Paris School of Business" />
      <span class="brand-cn">巴黎商学院</span>
      <div class="accred">
        <img class="accred-img" src="assets/psb-accred.png" alt="AACSB AMBA EQUIS" />
        <span class="accred-cap">三皇冠认证</span>
      </div>
    </header>

    <!-- Hero banner -->
    <section class="hero-banner">
      <img class="hero-banner-img" src="assets/psb-hero.png" alt="Build bridges, shape a better world" />
    </section>

    <!-- Mode selector -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="step">1</span>
          <span>选择典礼场景</span>
        </div>
        <span class="section-hint">CÉRÉMONIE</span>
      </div>
      <div class="mode-grid">
        <button class="mode-card" id="mode-opening" onclick="setMode('opening')">
          <span class="title serif">开学典礼</span>
          <span class="meta">学术起点 · 入学打卡</span>
          <span class="ribbon"></span>
        </button>
        <button class="mode-card" id="mode-graduation" onclick="setMode('graduation')">
          <span class="title serif">毕业典礼</span>
          <span class="meta">高光时刻 · 荣耀加冕</span>
          <span class="ribbon"></span>
        </button>
      </div>
    </section>

    <!-- Program selector -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="step">2</span>
          <span>选择您的专业项目</span>
        </div>
        <span class="section-hint">PROGRAMME</span>
      </div>
      <div class="prog-grid">
        <button class="prog selected" id="prog-EMIF" onclick="selectProgram('EMIF')">
          <span class="code">EMIF</span>
          <span class="meta-wrap">
            <span class="name">国际金融硕士</span>
            <span class="desc">Executive Master in International Finance</span>
          </span>
        </button>
        <button class="prog" id="prog-EMAP" onclick="selectProgram('EMAP')">
          <span class="code">EMAP</span>
          <span class="meta-wrap">
            <span class="name">应用心理学管理硕士</span>
            <span class="desc">Executive Master in Applied Psychology &amp; Business Management</span>
          </span>
        </button>
        <button class="prog" id="prog-EMLF" onclick="selectProgram('EMLF')">
          <span class="code">EMLF</span>
          <span class="meta-wrap">
            <span class="name">奢侈品与时尚管理硕士</span>
            <span class="desc">Executive Master in Luxury &amp; Fashion Management</span>
          </span>
        </button>
        <button class="prog" id="prog-EMEM" onclick="selectProgram('EMEM')">
          <span class="code">EMEM</span>
          <span class="meta-wrap">
            <span class="name">教育管理硕士</span>
            <span class="desc">Executive Master in Education Management</span>
          </span>
        </button>
      </div>
    </section>

    <!-- Submit -->
    <div class="submit-wrap">
      <button class="submit" id="submit" disabled onclick="generateContent()">
        <span id="submit-text">请先选择上方的典礼场景</span>
        <span class="arrow">→</span>
      </button>
    </div>

    <!-- Output -->
    <div class="output-wrap hidden" id="output-wrap">
      <div class="section-head" style="margin-bottom:14px;">
        <div class="section-title">
          <span class="step" id="step3">3</span>
          <span>专属打卡文案</span>
        </div>
        <span class="section-hint">CONTENU</span>
      </div>
      <div class="output-card">
        <div class="output-accent"></div>
        <div class="output-head">
          <span class="label" id="output-label">PSB 开学打卡</span>
          <span class="seal">巴黎商学院 · 官方</span>
        </div>
        <div class="output-body" id="content-container"></div>
        <div class="output-footer">
          <button class="copy-btn" id="copy-btn" onclick="copyContent()">
            <span>一键复制 · 去小红书发布</span>
            <span>→</span>
          </button>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="divider">
        <span class="bar"></span>
        <span class="mid"><b></b><i></i></span>
        <span>PSB · Paris</span>
        <span class="mid"><b></b><i></i></span>
        <span class="bar"></span>
      </div>
      <div class="official">巴黎商学院官方招生中心</div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="ico" id="toast-ico">✓</span>
    <span id="toast-text">复制成功</span>
  </div>

    ],
    EMAP: [
      "🧠开学典礼打卡｜开始系统学习心理学管理\n今天参加巴黎商学院PSB开学典礼，最真实的感受是：工作越久，越发现管理不是只看流程和KPI，很多问题背后都是人的动机、沟通和情绪。选择应用心理学管理硕士，是想把过去靠经验处理团队问题的方式，升级成更有方法论的专业能力。PSB成立于1974年，是国家认可的法国商科管理学院，同时拥有AACSB、EQUIS、AMBA三大认证。线上学习很适合在职节奏，也提醒我要把每一节课都落到真实工作里。",
      "📚开学典礼之后，给自己一个新的管理课题\n参加巴黎商学院PSB开学典礼时，我突然意识到，自己想提升的不只是职位，而是看懂组织和人的能力。应用心理学管理硕士对我来说很适合：一边保持工作节奏，一边系统学习组织行为、沟通、激励和决策心理。PSB是法国精英制商学院大学校联盟成员，拥有AACSB、EQUIS、AMBA三大认证，学术背景让我更安心。接下来的线上学习，希望我能少一点凭感觉管理，多一点专业判断和长期耐心。"

let currentMode = null;
let currentProgram = 'EMIF';
let isGenerating = false;

function setMode(mode){
  if (isGenerating) return;
  currentMode = mode;

  document.getElementById('mode-opening').classList.remove('active','opening','graduation');
  document.getElementById('mode-graduation').classList.remove('active','opening','graduation');
  document.body.classList.remove('mode-opening','mode-graduation','mode-none');

  if (mode==='opening'){
    document.getElementById('mode-opening').classList.add('active','opening');
    document.body.classList.add('mode-opening');
  } else {
    document.getElementById('mode-graduation').classList.add('active','graduation');
    document.body.classList.add('mode-graduation');
  }

  const sub = document.getElementById('submit');
  const subTxt = document.getElementById('submit-text');
  sub.disabled = false;
  sub.classList.remove('opening','graduation');
  sub.classList.add(mode);
  subTxt.textContent = mode==='opening' ? '生成开学打卡文案' : '生成毕业打卡文案';

  document.getElementById('output-label').textContent = mode==='opening' ? 'PSB 开学打卡' : 'PSB 毕业打卡';
}

function selectProgram(p){
  if (isGenerating) return;
  currentProgram = p;
  ['EMIF','EMAP','EMLF','EMEM'].forEach(k=>{
    document.getElementById('prog-'+k).classList.remove('selected');
  });
  document.getElementById('prog-'+p).classList.add('selected');
}

async function generateContent(){
  if (isGenerating || !currentMode) return;
  isGenerating = true;
  const wrap = document.getElementById('output-wrap');
  const container = document.getElementById('content-container');
  const sub = document.getElementById('submit');
  const subTxt = document.getElementById('submit-text');

  subTxt.textContent = '文案生成中...';
  sub.disabled = true;

  wrap.classList.remove('hidden');
  wrap.classList.add('reveal');
  container.innerHTML = '<div class="skeleton"><div class="spinner"></div><div class="txt">PSB 打卡文案 · 定制生成中</div></div>';

  setTimeout(()=>{
    wrap.scrollIntoView({behavior:'smooth',block:'start'});
  },80);

  try {
    let full = null;
    try {
      full = await requestApiContent(currentMode, currentProgram);
    } catch (err) {
      console.warn('API generation failed, using local fallback:', err);
    }

    if (!full) full = buildFallbackContent(currentMode, currentProgram);
    renderGeneratedContent(container, full);
  } finally {
    sub.disabled = false;
    subTxt.textContent = currentMode==='opening' ? '换一篇开学文案' : '换一篇毕业文案';
    isGenerating = false;

    const copyBtn = document.getElementById('copy-btn');
    copyBtn.classList.remove('opening','graduation');
    copyBtn.classList.add(currentMode);
  }
}

async function requestApiContent(mode, program){
  if (location.protocol === 'file:') return null;

  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mode, program})
  });
  if (!res.ok) throw new Error('API returned ' + res.status);

  const data = await res.json();
  return data.content || null;
}

function buildFallbackContent(mode, program){
  const templates = copywritingDatabase[mode][program];
  const txt = templates[Math.floor(Math.random()*templates.length)];
  return txt + '\n\n' + sceneNotes[mode] + '\n\n' + generalTags + '\n' + programTags[program];
}

function renderGeneratedContent(container, full){
  container.innerHTML = full.split('\n').map((line,i)=>{
    if (i===0) return '<div class="first-line">'+escapeHtml(line)+'</div>';
    if (line.trim().startsWith('#')) {
      const tags = line.trim().split(/\s+/).map(t=>'<span class="tag">'+escapeHtml(t)+'</span>').join('');
      return '<div style="margin-top:4px;">'+tags+'</div>';
    }
    if (line.trim()==='') return '<div style="height:4px;"></div>';
    return '<p>'+escapeHtml(line)+'</p>';
  }).join('');
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function copyContent(){
  const text = document.getElementById('content-container').innerText;
  if (navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('复制成功 · 可粘贴至小红书','ok')).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='absolute'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('复制成功','ok'); }
  catch(e){ showToast('请手动选择文本复制','err'); }
  document.body.removeChild(ta);
}

function showToast(msg, type){
  const t = document.getElementById('toast');
  const txt = document.getElementById('toast-text');
  const ico = document.getElementById('toast-ico');
  txt.textContent = msg;
  t.classList.remove('ok','err');
  t.classList.add(type);
  ico.textContent = type==='err' ? '!' : '✓';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2600);
}
